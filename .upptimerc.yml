# Change these first
owner: CopernicusAtmosphere # Your GitHub organization or username, where this repository lives
repo: upptime-cams # The name of this repository

# Assignee receives GitHub email when a downtime issue is opened
assignees:
  - sebsteinig

sites:
  # CAMS services (PROD)
  - name: Methane Explorer (PROD)
    url: https://apps.atmosphere.copernicus.eu/methane-explorer/
  - name: CAMS Data Sites (sites.ecmwf.int)
    url: https://sites.ecmwf.int/data/cams/


  # CAMS services (DEV)
  - name: vAirify (dashboard)
    url: http://64.225.143.231/city/summary
  - name: vAirify (API)
    url: "http://64.225.143.231/api/air-pollutant/measurements?date_from=2026-03-02T12:00:00.000Z&date_to=2026-03-03T12:00:00.000Z&location_type=city&location_names=Brussels"
  - name: Fire Watch (website)
    url: https://apps.atmosphere.copernicus.eu/fire-watch/
    headers:
      - "Authorization: Basic $CAMS_DEV_AUTH"
  - name: GFAS (API)
    url: "https://apps.atmosphere.copernicus.eu/gfas/api/api/anomalies/?variable=cfire&start_date=2026-01-01&end_date=2026-01-31&adm0=ALL&all_years=true&aggregation=SUM&timeout=120"
  - name: Methane Explorer (DEV)
    url: https://apps.copernicus-climate.eu/methane-explorer/
    headers:
      - "Authorization: Basic $CAMS_DEV_AUTH"
  - name: Zarr Globe (website)
    url: https://apps.atmosphere.copernicus.eu/zarr-globe

status-website:
  baseUrl: /upptime-cams
  name: CAMS Services Status Dashboard
  introTitle: "**Status Dashboard** "
  introMessage: This status page tracks the uptime and response times of selected CAMS apps and services. Powered by [Upptime](https://upptime.js.org) — GitHub Actions, Issues, and Pages.
  navbar:
    - title: Status
      href: /upptime-cams/
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
  # Pure CSS grouping via ::before on article elements inside section.live-status.
  # Sites order: 1-6 = CAMS PROD, 7 = CAMS DEV
  # If you add/remove/reorder sites, update the nth-of-type numbers below.
  customHeadHtml: |
    <style>
    section.live-status > article:nth-of-type(1) {
      margin-top: 2.5rem;
    }
    section.live-status > article:nth-of-type(3) {
      margin-top: 3.5rem;
    }
    section.live-status > article:nth-of-type(1)::before,
    section.live-status > article:nth-of-type(3)::before {
      position: absolute;
      top: -2.2rem;
      left: 0;
      right: 0;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--body-text-color, #f0ffff);
      padding-bottom: 0.3rem;
      border-bottom: 2px solid var(--nav-border-bottom-color, #015450);
    }
    section.live-status > article:nth-of-type(1)::before  { content: "CAMS Services (PROD)"; }
    section.live-status > article:nth-of-type(3)::before  { content: "CAMS Services (DEV)"; }
    </style>

# Upptime also supports notifications, assigning issues, and more
